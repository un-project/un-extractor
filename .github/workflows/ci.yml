name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Create virtualenv and install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt

      - name: black
        run: uv run --no-project black --check src/ tests/ *.py

      - name: flake8
        run: uv run --no-project flake8 src/ tests/ *.py

      - name: mypy
        run: uv run --no-project mypy src/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Create virtualenv and install dependencies
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -r requirements.txt

      - name: pytest
        run: uv run --no-project pytest --cov=src --cov-report=term-missing
